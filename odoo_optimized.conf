[options]
; 基本配置
addons_path = ./odoo/addons
admin_passwd = Odoo123456
db_host = 127.0.0.1
db_port = 5432
db_user = odoo
db_password = odoo
database = odoo

; 性能优化 - 针对测试环境
workers = 1  ; 开发环境使用1个worker避免并发问题
limit_memory_hard = 2147483648  ; 2GB
limit_memory_soft = 1610612736  ; 1.5GB
limit_time_cpu = 300  ; 5分钟
limit_time_real = 600  ; 10分钟
limit_request = 2048  ; 减少请求限制
db_maxconn = 16  ; 减少数据库连接

; 网络配置
xmlrpc_port = 8069
xmlrpc_interface = 127.0.0.1
longpolling_port = 8072

; 日志配置
logfile = C:/Apps/odoo/odoo_optimized.log
log_level = info
log_handler = :INFO
log_db = False

; 缓存和会话
data_dir = C:/Apps/odoo/.local/share/Odoo
session_expiration = 3600

; 开发模式优化
dev_mode = reload, qweb, xml
test_enable = False

; 安全配置
list_db = True
dbfilter = odoo
proxy_mode = False

; 线程池优化
max_cron_threads = 1  ; 减少定时任务线程
server_wide_modules = web

; 请求处理优化
request_timeout = 120  ; 2分钟超时
limit_time_real_cron = 120  ; 定时任务超时

; 数据库连接池优化
db_connection_pool_size = 8  ; 减少连接池大小
db_connection_pool_recycle = 1800  ; 30分钟回收连接

; 缓存优化
osv_memory_age_limit = 0.5  ; 30分钟
osv_memory_count_limit = 100000

; 邮件服务器（可选）
smtp_server = localhost
smtp_port = 25
smtp_user = False
smtp_password = False
smtp_ssl = False
smtp_ssl_certificate_filename = False
smtp_ssl_private_key_filename = False

; 报告配置
reportgz = False
unaccent = False

; 其他优化
without_demo = False
demo = {}
translate_modules = ['all']
overrides = {}
load_language = 
stop_after_init = False