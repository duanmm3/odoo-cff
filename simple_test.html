<!DOCTYPE html>
<html>
<head>
    <title>Test Price Module</title>
</head>
<body>
    <h1>Test Price Module Access</h1>
    
    <div id="results">
        <p>Testing connections...</p>
    </div>
    
    <script>
        async function testEndpoint(endpoint) {
            try {
                const response = await fetch(endpoint, { 
                    redirect: 'manual',
                    credentials: 'include'
                });
                
                let result = `Status: ${response.status}`;
                
                if (response.status === 302 || response.status === 303) {
                    const location = response.headers.get('Location');
                    result += ` - Redirect to: ${location}`;
                    return { success: true, message: result };
                } else if (response.status === 200) {
                    result += ` - OK`;
                    return { success: true, message: result };
                } else if (response.status === 404) {
                    result += ` - Not Found`;
                    return { success: false, message: result };
                } else {
                    return { success: false, message: result };
                }
            } catch (error) {
                return { success: false, message: `Error: ${error.message}` };
            }
        }
        
        async function runTests() {
            const endpoints = [
                '/price/query',
                '/price/config',
                '/price/api/query/STM32F103C8T6'
            ];
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            
            for (const endpoint of endpoints) {
                const result = await testEndpoint(endpoint);
                const div = document.createElement('div');
                div.style.padding = '10px';
                div.style.margin = '5px';
                div.style.backgroundColor = result.success ? '#d4edda' : '#f8d7da';
                div.style.border = '1px solid #c3e6cb';
                div.innerHTML = `<strong>${endpoint}</strong><br>${result.message}`;
                resultsDiv.appendChild(div);
            }
        }
        
        // Run tests when page loads
        window.onload = runTests;
    </script>
</body>
</html>
